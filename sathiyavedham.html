<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pro Radio Player</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    background: #0d0d0d;
    color: #fff;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .player {
    background: #1a1a1a;
    padding: 25px;
    border-radius: 16px;
    width: 280px;
    text-align: center;
    box-shadow: 0 0 20px rgba(0,0,0,0.6);
  }

  h3 {
    margin-bottom: 15px;
  }

  button {
    background: #00ff99;
    border: none;
    padding: 12px 20px;
    font-size: 18px;
    border-radius: 50px;
    cursor: pointer;
    margin-top: 10px;
  }

  input[type="range"] {
    width: 100%;
    margin-top: 15px;
  }

  .live {
    color: red;
    margin-top: 10px;
    font-weight: bold;
    animation: blink 1s infinite;
  }

  @keyframes blink {
    0% {opacity: 1;}
    50% {opacity: 0.3;}
    100% {opacity: 1;}
  }

  iframe {
    width: 0;
    height: 0;
    border: 0;
  }
</style>
</head>

<body>

<div class="player">
  <h3><a href="index.html" style="padding-right: 10px;">🎧</a>Comforter Radio</h3>

  <button onclick="togglePlay()" id="btn">▶ Play</button>

  <!-- <input type="range" min="0" max="100" value="100" id="volume"> -->

  <div class="live">🔴 LIVE</div>
</div>

<!-- Hidden iframe -->
<iframe id="radioFrame" allow="autoplay"></iframe>

<script>
  const frame = document.getElementById("radioFrame");
  const btn = document.getElementById("btn");
  const volume = document.getElementById("volume");

  let isPlaying = false;

  function togglePlay() {
    if (!isPlaying) {
      frame.src = "https://embed.radio.co/player/abab912.html";
      btn.innerText = "⏸ Pause";
      isPlaying = true;
    } else {
      frame.src = "";
      btn.innerText = "▶ Play";
      isPlaying = false;
    }
  }

  // Fake volume (iframe limitation)
  // volume.addEventListener("input", () => {
  //   console.log("Volume:", volume.value);
  //   // iframe audio control not possible (browser restriction)
  // });
</script>

</body>
</html>
